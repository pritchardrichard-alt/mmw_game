<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>MIGHTY MINI WORLD: THE MYCELIUM WARS</title>
<style>
html,body{margin:0;background:#02020b;color:white;font-family:Courier New,monospace;overflow:hidden;touch-action:none;text-transform:uppercase}
#wrap{width:100vw;height:100vh;display:flex;justify-content:center;align-items:center;background:#02020b}
canvas{background:#02020b;image-rendering:pixelated;max-width:100vw;max-height:100vh}
#bar{position:fixed;top:8px;left:10px;right:10px;display:flex;justify-content:space-between;pointer-events:none;color:#b8ffbf;font-size:13px}
button{pointer-events:auto;background:#123d1b;color:#b8ffbf;border:2px solid #52ff6a;padding:8px 10px;font-family:Courier New,monospace;font-weight:bold}
#mobile{position:fixed;left:0;right:0;bottom:0;height:170px;display:none;pointer-events:none}
.pad,.fire{position:absolute;bottom:22px;pointer-events:auto;user-select:none}
.pad{left:22px;width:132px;height:132px;border:2px solid #52ff6a;border-radius:50%;background:rgba(82,255,106,.12)}
.stick{position:absolute;left:45px;top:45px;width:42px;height:42px;border-radius:50%;background:rgba(184,255,191,.55)}
.fire{right:26px;width:112px;height:112px;border-radius:50%;border:2px solid #fff36b;background:rgba(255,243,107,.18);color:#fff36b;font-size:18px;font-weight:bold;display:flex;align-items:center;justify-content:center}
@media (max-width:900px),(pointer:coarse){#mobile{display:block}#help{display:none}}
</style>
</head>
<body>
<div id="bar">
<div id="help">ARROWS/WASD = MOVE | SPACE = FIRE | R = RESTART</div>
<div><button onclick="toggleSound()">SOUND</button> <button onclick="toggleFull()">FULL SCREEN</button></div>
</div>
<div id="wrap"><canvas id="game" width="960" height="540"></canvas></div>
<div id="mobile"><div class="pad" id="pad"><div class="stick" id="stick"></div></div><div class="fire" id="fire">FIRE</div></div>

<script>
const canvas=document.getElementById("game"),ctx=canvas.getContext("2d");
let keys={},touch={x:0,y:0},touchFire=false,soundOn=true,audioCtx=null;
let stars=[],bullets=[],enemyShots=[],enemies=[],coins=[],particles=[],planets=[],galaxies=[];
let bugolla=0,wave=1,waveTarget=100,nextPlanet=50,flash=0,won=false,spawnTimer=20;
const player={x:120,y:260,w:46,h:24,speed:6.7,cooldown:0,inv:0};

function resize(){let r=16/9,w=innerWidth,h=innerHeight;if(w/h>r)w=h*r;else h=w/r;canvas.style.width=w+"px";canvas.style.height=h+"px";}
addEventListener("resize",resize);resize();

function toggleFull(){if(!document.fullscreenElement)document.documentElement.requestFullscreen();else document.exitFullscreen();}
function toggleSound(){soundOn=!soundOn;}
function ac(){if(!audioCtx)audioCtx=new (window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function beep(type){
 if(!soundOn)return; const a=ac(),o=a.createOscillator(),g=a.createGain(),n=a.currentTime;o.connect(g);g.connect(a.destination);
 if(type==="shoot"){o.type="square";o.frequency.setValueAtTime(620,n);o.frequency.exponentialRampToValueAtTime(250,n+.08);g.gain.setValueAtTime(.06,n);g.gain.exponentialRampToValueAtTime(.001,n+.09);o.start(n);o.stop(n+.1);}
 if(type==="boom"){o.type="sawtooth";o.frequency.setValueAtTime(180,n);o.frequency.exponentialRampToValueAtTime(45,n+.18);g.gain.setValueAtTime(.11,n);g.gain.exponentialRampToValueAtTime(.001,n+.2);o.start(n);o.stop(n+.21);}
 if(type==="coin"){
   o.type="sine";
   o.frequency.setValueAtTime(880,n);
   o.frequency.setValueAtTime(1320,n+.06);
   o.frequency.setValueAtTime(1760,n+.12);
   g.gain.setValueAtTime(.09,n);
   g.gain.exponentialRampToValueAtTime(.001,n+.32);
   o.start(n);o.stop(n+.34);
 }
 if(type==="hit"){o.type="triangle";o.frequency.setValueAtTime(120,n);o.frequency.exponentialRampToValueAtTime(45,n+.25);g.gain.setValueAtTime(.14,n);g.gain.exponentialRampToValueAtTime(.001,n+.28);o.start(n);o.stop(n+.3);}
 if(type==="win"){o.type="square";o.frequency.setValueAtTime(440,n);o.frequency.setValueAtTime(660,n+.12);o.frequency.setValueAtTime(880,n+.24);g.gain.setValueAtTime(.12,n);g.gain.exponentialRampToValueAtTime(.001,n+.55);o.start(n);o.stop(n+.58);}
}

for(let i=0;i<140;i++)stars.push({x:Math.random()*960,y:Math.random()*540,s:Math.random()*2+1,v:.25+Math.random()*1.2});

function reset(){
 bullets=[];enemyShots=[];enemies=[];coins=[];particles=[];planets=[];galaxies=[];
 bugolla=0;wave=1;waveTarget=100;nextPlanet=50;flash=0;won=false;spawnTimer=20;
 player.x=120;player.y=260;player.cooldown=0;player.inv=80;
}
document.addEventListener("keydown",e=>{keys[e.key.toLowerCase()]=true;if(e.code==="Space"){keys.space=true;e.preventDefault();}if(e.key.toLowerCase()==="r")reset();});
document.addEventListener("keyup",e=>{keys[e.key.toLowerCase()]=false;if(e.code==="Space")keys.space=false;});
const pad=document.getElementById("pad"),stick=document.getElementById("stick"),fire=document.getElementById("fire");
pad.addEventListener("touchstart",moveTouch,{passive:false});pad.addEventListener("touchmove",moveTouch,{passive:false});
pad.addEventListener("touchend",()=>{touch={x:0,y:0};stick.style.left="45px";stick.style.top="45px";});
function moveTouch(e){e.preventDefault();let r=pad.getBoundingClientRect(),t=e.touches[0],dx=t.clientX-(r.left+r.width/2),dy=t.clientY-(r.top+r.height/2),len=Math.max(1,Math.hypot(dx,dy)),m=44;if(len>m){dx=dx/len*m;dy=dy/len*m;}touch={x:dx/m,y:dy/m};stick.style.left=(45+dx)+"px";stick.style.top=(45+dy)+"px";}
fire.addEventListener("touchstart",e=>{e.preventDefault();touchFire=true;});fire.addEventListener("touchend",e=>{e.preventDefault();touchFire=false;});

function hit(a,b){return a&&b&&typeof a.x==="number"&&typeof b.x==="number"&&a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}
function segs(e){return e && Array.isArray(e.segments) ? e.segments : [];}
function repairEnemy(e){
 if(!e)return null;
 if((e.type==="WORM"||e.type==="WOWWORM") && !Array.isArray(e.segments)){
   const count=e.type==="WOWWORM"?12:11;
   e.segments=[];
   for(let i=0;i<count;i++)e.segments.push({x:(e.x||0)+i*22,y:e.y||0});
 }
 return e;
}
function family(t){if(["WORM","WOWWORM"].includes(t))return"WORM";if(["BUG","BILLY","BOB","MRBUGOLLAR"].includes(t))return"BUG";if(["VIRUSREX","VICTOR"].includes(t))return"VIRUS";if(t==="SPIDER")return"SPIDER";return"MUSHROOM";}
function sameFamily(t){let f=family(t);return enemies.some(e=>e&&family(e.type)===f);}
function hpFor(type,base){
 let f=family(type);
 if(type==="MRBUGOLLAR"&&wave>=10)return 125;
 if(wave>=10){if(f==="MUSHROOM")return 30;if(f==="BUG")return 90;if(f==="VIRUS")return 75;if(f==="WORM")return 50;if(f==="SPIDER")return 63;}
 if(wave>=9){if(f==="MUSHROOM")return 15;if(f==="BUG")return 45;if(f==="VIRUS")return 38;if(f==="WORM")return 25;if(f==="SPIDER")return 30;}
 if(wave>=8){if(f==="MUSHROOM")return 8;if(f==="BUG")return 23;if(f==="VIRUS")return 25;if(f==="WORM")return 13;if(f==="SPIDER")return 15;}
 if(wave>=7){if(f==="MUSHROOM")return 8;if(f==="BUG")return 23;if(f==="VIRUS")return 25;if(f==="WORM")return 13;if(f==="SPIDER")return 15;}
 return base;
}
function stats(type){
 let s={type,x:1040,y:70+Math.random()*330,w:44,h:44,vx:-2,hp:1,maxHp:1,value:1,damage:1,label:type,t:0,shoot:60+Math.random()*80};
 if(type==="MINION"){Object.assign(s,{w:36,h:42,vx:-4-wave*.24,value:2,damage:1,label:"MINION MUSHROOM",color:"#3FA9FF"});}
 if(type==="MEGA"){Object.assign(s,{w:54,h:54,vx:-2.8-wave*.2,value:4,damage:2,label:"MEGA MUSHROOM",color:"#FF3B30"});}
 if(type==="WORM"){Object.assign(s,{w:240,h:44,vx:-1.05,hp:10,value:6,damage:3,label:"WILLY WAGGLE WORM",seg:11});}
 if(type==="SPIDER"){Object.assign(s,{w:48,h:42,vx:-3.1-wave*.2,hp:15,value:4,damage:5,label:"SPACEY SPIDER",color:"#8CFF5F"});}
 if(type==="BUG"){Object.assign(s,{w:96,h:82,vx:-1.25,hp:20,value:6,damage:5,label:"BUG BEAST",color:"#39FF61",ant:2});}
 if(type==="VIRUSREX"){Object.assign(s,{w:104,h:104,vx:-.95,hp:30,value:12,damage:5,label:"VIRUS-REX"});}
 if(type==="BILLY"){Object.assign(s,{w:130,h:55,vx:-1.55,hp:20,value:2,damage:10,label:"BILLY BUG",color:"#7CFF4D"});}
 if(type==="VICTOR"){Object.assign(s,{w:96,h:70,vx:-1.35,hp:30,value:4,damage:5,label:"VIRUS VICTOR",color:"#1E7CFF"});}
 if(type==="BOB"){Object.assign(s,{w:120,h:92,vx:-1.15,hp:20,value:6,damage:5,label:"BOB THE BUGGER",color:"#083F1D",ant:7});}
 if(type==="WOWWORM"){Object.assign(s,{w:260,h:50,vx:-2.2,hp:10,value:4,damage:10,label:"WOW WORM",seg:12});}
 if(type==="MRBUGOLLAR"){Object.assign(s,{w:150,h:120,vx:-.9,hp:20,value:20,damage:25,label:"MR BUGOLLAR",color:"#39FF61",ant:10});}
 s.hp=hpFor(type,s.hp);s.maxHp=s.hp;
 if(s.seg){s.segments=[];for(let i=0;i<s.seg;i++)s.segments.push({x:s.x+i*22,y:s.y});}
 return s;
}
function spawnEnemy(){
 let choices=["MINION","MINION","MEGA","MEGA","MEGA"];
 let specials=["WORM"];
 if(wave>=2)specials.push("BUG");
 if(wave>=3)specials.push("VIRUSREX");
 if(wave>=4)specials.push("SPIDER");
 if(wave>=5)specials.push("BILLY");
 if(wave>=7)specials.push("VICTOR");
 if(wave>=8)specials.push("BOB");
 if(wave>=9)specials.push("WOWWORM");
 if(wave>=10)specials.push("MRBUGOLLAR");
 let avail=specials.filter(t=>!sameFamily(t));
 let type=(avail.length&&Math.random()<.32)?avail[Math.floor(Math.random()*avail.length)]:choices[Math.floor(Math.random()*choices.length)];
 enemies.push(stats(type));
}

function boom(x,y,n){for(let i=0;i<n;i++)particles.push({x,y,vx:(Math.random()-.5)*6,vy:(Math.random()-.5)*6,life:20+Math.random()*20});}
function addCoins(v){
 bugolla += v;
 beep("coin");

 if(bugolla >= 1000 && !won){
   won = true;
   flash = 999999;
   beep("win");
   return;
 }

 while(bugolla >= waveTarget && wave < 10){
   wave++;
   waveTarget += 100;
   enemies = [];
   enemyShots = [];
   flash = 120;
   beep("win");
 }
}
function dropCoins(x,y,v){let count=Math.min(10,Math.max(1,Math.ceil(v/2)));for(let i=0;i<count;i++)coins.push({x:x+(i-(count-1)/2)*18,y:y+(Math.random()-.5)*10,spin:Math.random()*6,vy:-1.5-Math.random(),life:100});addCoins(v);}
function lose(v){bugolla=Math.max(0,bugolla-v);}

function spawnPlanet(){
 let arr=[["#4DA6FF","#BDEBFF","#153B80"],["#FF5A2A","#FFD34D","#7A1E10"],["#4DFF7A","#0B7A35","#063A18"],["#B44DFF","#F4C7FF","#4D1670"],["#FFD84D","#FFF6A0","#8A6400"]];
 let p=arr[Math.floor(Math.random()*arr.length)];
 planets=[{x:1040,y:85+Math.random()*255,r:58+Math.random()*38,color:p[0],spot:p[1],shadow:p[2],vx:-.42,delay:240}];
}
function spawnGalaxy(){
 let arr=[["rgba(180,77,255,.30)","rgba(255,122,232,.22)"],["rgba(77,166,255,.30)","rgba(189,235,255,.20)"],["rgba(77,255,122,.25)","rgba(180,255,190,.18)"],["rgba(255,122,232,.24)","rgba(255,216,77,.18)"]];
 let g=arr[Math.floor(Math.random()*arr.length)];
 galaxies=[{x:1120,y:110+Math.random()*220,r:135+Math.random()*55,c1:g[0],c2:g[1],vx:-.20}];
}

function update(){
 if(won)return;
 if(flash>0)flash--;
 stars.forEach(s=>{s.x-=s.v;if(s.x<0){s.x=960;s.y=Math.random()*540;}});
 
 
 let mx=0,my=0;if(keys.arrowup||keys.w)my--;if(keys.arrowdown||keys.s)my++;if(keys.arrowleft||keys.a)mx--;if(keys.arrowright||keys.d)mx++;mx+=touch.x;my+=touch.y;
 player.x=Math.max(10,Math.min(904,player.x+mx*player.speed));player.y=Math.max(40,Math.min(456,player.y+my*player.speed));
 if(player.cooldown>0)player.cooldown--;if(player.inv>0)player.inv--;
 if((keys.space||touchFire)&&player.cooldown===0){
  let offs=[0];if(wave>=3)offs=[-8,8];if(wave>=6)offs=[-12,0,12];if(wave>=8)offs=[-18,-6,6,18];if(wave>=10)offs=[-24,-12,0,12,24];
  offs.forEach(o=>bullets.push({x:player.x+player.w,y:player.y+8+o,w:20,h:5,vx:10}));
  player.cooldown=wave>=9?4:wave>=7?6:8;beep("shoot");
 }
 if(--spawnTimer<=0){if(enemies.length<22)spawnEnemy();spawnTimer=Math.max(14,48-wave*3);}
 bullets.forEach(b=>b.x+=b.vx);
 enemies=enemies.map(repairEnemy).filter(e=>e&&typeof e.x==="number");
 enemies.forEach(e=>{
  e.t++;e.x+=e.vx;e.y+=Math.sin(e.t/18)*.45;
  if(segs(e).length)segs(e).forEach((seg,i)=>{seg.x=e.x+i*22;seg.y=e.y+Math.sin((e.t+i*8)/(e.type==="WOWWORM"?8:16))*18;});
  if(--e.shoot<=0&&enemyShots.length<24){enemyShots.push({x:e.x+e.w/2,y:e.y+e.h/2,w:13,h:13,vx:-3.2-wave*.1,vy:(player.y-e.y)*.005,damage:e.damage,color:family(e.type)==="VIRUS"?"#FF4DFF":"#BEFF5C"});e.shoot=70+Math.random()*110;}
 });
 enemyShots.forEach(s=>{s.x+=s.vx;s.y+=s.vy;});
 coins.forEach(c=>{c.spin+=.18;c.y+=c.vy;c.vy=Math.min(1.6,c.vy+.04);c.life--;});
 particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life--;});
 for(let i=enemies.length-1;i>=0;i--){
  let e=enemies[i];
  for(let j=bullets.length-1;j>=0;j--){
   let h=false;
   if(segs(e).length){for(const seg of segs(e)){if(hit(bullets[j],{x:seg.x-12,y:seg.y-12,w:24,h:24})){h=true;break;}}}
   else h=hit(bullets[j],e);
   if(h){bullets.splice(j,1);e.hp--;boom(e.x+e.w/2,e.y+e.h/2,8);if(e.hp<=0){dropCoins(e.x+e.w/2,e.y+e.h/2,e.value);boom(e.x+e.w/2,e.y+e.h/2,25);enemies.splice(i,1);beep("boom");}break;}
  }
 }
 if(player.inv===0){
  let dmg=0,box={x:player.x,y:player.y,w:player.w,h:player.h};
  for(let i=enemyShots.length-1;i>=0;i--)if(hit(box,enemyShots[i])){dmg=Math.max(dmg,enemyShots[i].damage);enemyShots.splice(i,1);}
  enemies.forEach(e=>{let h=false;if(segs(e).length){for(const seg of segs(e)){if(hit(box,{x:seg.x-12,y:seg.y-12,w:24,h:24})){h=true;break;}}}else h=hit(box,e);if(h)dmg=Math.max(dmg,e.damage);});
  if(dmg>0){lose(dmg);player.inv=80;boom(player.x,player.y,18);beep("hit");}
 }
 bullets=bullets.filter(b=>b.x<990).slice(-80);enemyShots=enemyShots.filter(s=>s.x>-30&&s.y>-30&&s.y<560).slice(-24);enemies=enemies.filter(e=>e.x>-340).slice(-24);
 coins=coins.filter(c=>c.life>0&&c.y<500).slice(-60);particles=particles.filter(p=>p.life>0).slice(-100);planets=planets.filter(p=>p.x+p.r>-80).slice(-1);galaxies=galaxies.filter(g=>g.x+g.r>-120).slice(-1);
}

function cute(cx,cy,s=1){ctx.fillStyle="#fff";ctx.fillRect(cx-8*s,cy-6*s,6*s,6*s);ctx.fillRect(cx+2*s,cy-6*s,6*s,6*s);ctx.fillStyle="#000";ctx.fillRect(cx-6*s,cy-4*s,2*s,2*s);ctx.fillRect(cx+4*s,cy-4*s,2*s,2*s);ctx.fillStyle="#FFB6C1";ctx.fillRect(cx-12*s,cy+1*s,3*s,3*s);ctx.fillRect(cx+9*s,cy+1*s,3*s,3*s);ctx.fillStyle="#FF99CC";ctx.fillRect(cx-2*s,cy+6*s,5*s,2*s);}
function label(e,x,y){ctx.fillStyle="#fff";ctx.font="13px Courier New";ctx.textAlign="center";ctx.fillText(e.label,x,y-10);if(e.maxHp>1)ctx.fillText("HP "+e.hp+"/"+e.maxHp,x,y+e.h+14);ctx.textAlign="left";}
function drawUFO(){if(player.inv>0&&Math.floor(player.inv/6)%2===0)return;ctx.fillStyle="#B7F7FF";ctx.fillRect(player.x+10,player.y,26,10);cute(player.x+23,player.y+10,.6);ctx.fillStyle="#52FF6A";ctx.fillRect(player.x,player.y+9,46,10);ctx.fillStyle="#17772A";ctx.fillRect(player.x+8,player.y+19,30,5);ctx.fillStyle="#FFF36B";ctx.fillRect(player.x+38,player.y+12,6,4);}
function drawEnemy(e){
 let cx=e.x+e.w/2,cy=e.y+e.h/2;
 if(e.type==="MINION"||e.type==="MEGA"){ctx.fillStyle="#64D85E";ctx.fillRect(e.x+e.w*.35,e.y+e.h*.45,e.w*.25,e.h*.5);ctx.fillStyle=e.color;ctx.fillRect(e.x,e.y,e.w,e.h*.45);ctx.fillStyle="#fff";ctx.fillRect(e.x+e.w*.18,e.y+e.h*.10,6,6);ctx.fillRect(e.x+e.w*.48,e.y+e.h*.06,7,7);ctx.fillRect(e.x+e.w*.72,e.y+e.h*.14,6,6);cute(cx,e.y+12,.8);label(e,cx,e.y);}
 if(e.type==="SPIDER"){ctx.fillStyle=e.color;ctx.fillRect(e.x+10,e.y+10,28,22);ctx.fillStyle="#B8FFBF";for(let i=0;i<4;i++){ctx.fillRect(e.x-2,e.y+8+i*7,14,3);ctx.fillRect(e.x+36,e.y+8+i*7,14,3);}cute(cx,cy,.8);label(e,cx,e.y);}
 if(e.type==="WORM"||e.type==="WOWWORM"){
   const ss=segs(e);
   if(!ss.length)return;
   ss.forEach((seg,i)=>{
     if(!seg||typeof seg.x!=="number")return;
     let hue=(e.t*3+i*28+wave*35)%360,size=Math.max(12,26-(e.maxHp-e.hp)/10);
     ctx.fillStyle=i===0||e.type==="WOWWORM"&&i===1?"#FF3B3B":"hsl("+hue+",95%,58%)";
     ctx.fillRect(seg.x-size/2,seg.y-size/2,size,size);
   });
   if(ss[0])cute(ss[0].x,ss[0].y,.9);
   label(e,e.x+45,e.y-20);
 }
 if(["BUG","BOB","MRBUGOLLAR"].includes(e.type)){ctx.fillStyle=e.color;let ants=e.ant||2;for(let i=0;i<ants;i++){let ax=e.x+10+i*(e.w-20)/Math.max(1,ants-1);ctx.fillRect(ax,e.y-22,5,22);ctx.fillRect(ax-4,e.y-28,13,7);}ctx.fillRect(e.x,e.y,e.w,e.h);ctx.fillStyle="#0B5A20";ctx.fillRect(e.x+18,e.y+22,22,22);ctx.fillRect(e.x+e.w-40,e.y+22,22,22);cute(cx,cy,1);label(e,cx,e.y);}
 if(e.type==="VIRUSREX"){let r=42+Math.sin(e.t/4)*5,flash=Math.floor(e.t/8)%2===0?"#B000FF":"#FF4DFF";ctx.fillStyle=flash;for(let i=0;i<16;i++){let a=i*Math.PI*2/16;ctx.fillRect(cx+Math.cos(a)*(r+8)-5,cy+Math.sin(a)*(r+8)-5,10,10);}ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();ctx.fillStyle="#31003F";ctx.beginPath();ctx.arc(cx,cy,r-15,0,Math.PI*2);ctx.fill();cute(cx,cy,1.2);label(e,cx,e.y);}
 if(e.type==="BILLY"){ctx.fillStyle=e.color;ctx.fillRect(e.x,e.y+10,e.w,30);ctx.fillStyle="#B8FFBF";for(let i=0;i<3;i++)ctx.fillRect(e.x+25+i*35,e.y+40,8,24);cute(cx,cy,1);label(e,cx,e.y);}
 if(e.type==="VICTOR"){ctx.save();ctx.translate(cx,cy);ctx.fillStyle=e.color;ctx.scale(1.45,1);ctx.beginPath();ctx.arc(0,0,33,0,Math.PI*2);ctx.fill();ctx.restore();cute(cx,cy,1);label(e,cx,e.y);}
}
function drawCoin(c){let sx=Math.max(4,Math.abs(Math.cos(c.spin))*24);ctx.save();ctx.translate(c.x,c.y);ctx.fillStyle="#8A5A00";ctx.beginPath();ctx.ellipse(2,2,sx/2+4,16,0,0,Math.PI*2);ctx.fill();ctx.fillStyle="#C98A00";ctx.beginPath();ctx.ellipse(0,0,sx/2+5,16,0,0,Math.PI*2);ctx.fill();ctx.fillStyle="#FFD84D";ctx.beginPath();ctx.ellipse(0,0,sx/2+1,12,0,0,Math.PI*2);ctx.fill();if(sx>9){ctx.fillStyle="#2B8A28";ctx.font="bold 12px Courier New";ctx.textAlign="center";ctx.fillText("B",0,4);}ctx.restore();ctx.textAlign="left";}
function drawPlanet(p){ctx.save();ctx.translate(p.x,p.y);ctx.fillStyle=p.shadow;ctx.beginPath();ctx.arc(0,0,p.r,0,Math.PI*2);ctx.fill();ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(-p.r*.1,-p.r*.08,p.r*.92,0,Math.PI*2);ctx.fill();ctx.fillStyle=p.spot;ctx.beginPath();ctx.arc(-p.r*.32,-p.r*.25,p.r*.2,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(p.r*.25,p.r*.18,p.r*.13,0,Math.PI*2);ctx.fill();ctx.restore();}
function drawGalaxy(g){ctx.save();ctx.globalAlpha=.78;ctx.translate(g.x,g.y);for(let i=0;i<5;i++){ctx.strokeStyle=i%2===0?g.c1:g.c2;ctx.lineWidth=24-i*3;ctx.beginPath();ctx.ellipse(0,0,g.r*(1-i*.1),g.r*.3*(1+i*.05),0,0,Math.PI*2);ctx.stroke();}ctx.fillStyle="rgba(255,255,255,.35)";ctx.beginPath();ctx.arc(0,0,12,0,Math.PI*2);ctx.fill();ctx.restore();ctx.globalAlpha=1;}
function draw(){
 ctx.fillStyle="#02020B";ctx.fillRect(0,0,960,540);
 ctx.fillStyle="#fff";stars.forEach(s=>ctx.fillRect(s.x,s.y,s.s,s.s));
 drawUFO();ctx.fillStyle="#FFF36B";bullets.forEach(b=>ctx.fillRect(b.x,b.y,b.w,b.h));enemies.forEach(drawEnemy);
 enemyShots.forEach(s=>{ctx.fillStyle=s.color;ctx.fillRect(s.x,s.y,s.w,s.h);});coins.forEach(drawCoin);ctx.fillStyle="#FFFD8A";particles.forEach(p=>ctx.fillRect(p.x,p.y,3,3));
 ctx.fillStyle="#B8FFBF";ctx.font="bold 34px Courier New";ctx.textAlign="right";ctx.fillText("MIGHTY MINI WORLD:",942,36);ctx.fillText("THE MYCELIUM WARS",942,78);ctx.textAlign="left";
 ctx.fillStyle="rgba(0,0,0,.68)";ctx.fillRect(0,496,960,44);ctx.fillStyle="#B8FFBF";ctx.font="21px Courier New";ctx.fillText("BUGOLLA COINS "+bugolla,20,526);ctx.fillText("WAVE "+wave+"/10  NEXT "+waveTarget,430,526);ctx.fillText("FIRE "+(wave>=10?5:wave>=8?4:wave>=6?3:wave>=3?2:1)+"X",780,526);
 if(flash>0||won){ctx.fillStyle="rgba(0,0,0,.72)";ctx.fillRect(0,0,960,540);ctx.fillStyle="#52FF6A";ctx.textAlign="center";ctx.font=won?"34px Courier New":"36px Courier New";if(won){ctx.fillText("YOU HAVE WON A BUGZILLION BUGOLLAS",480,235);ctx.fillText("AND THE WAR!",480,285);ctx.font="20px Courier New";ctx.fillText("PRESS R TO RESTART",480,335);}else{ctx.fillText("YOU HAVE WON 100 BUGOLLAS!",480,250);ctx.font="24px Courier New";ctx.fillText("NEXT WAVE BEGINS",480,295);}ctx.textAlign="left";}
}
function loop(){update();draw();requestAnimationFrame(loop);}
loop();
</script>

    box.id='errbox';
    box.style.position='fixed';
    box.style.left='10px';
    box.style.bottom='10px';
    box.style.background='rgba(120,0,0,.92)';
    box.style.color='white';
    box.style.padding='10px';
    box.style.zIndex='9999';
    box.style.fontFamily='Courier New, monospace';
    document.body.appendChild(box);
  }
  box.textContent='GAME ERROR: '+e.message;
});
